//
// ClientPayload: the authenticated payload sent by the client inside
// the final leg of the Noise XX handshake. Carries either login
// credentials (for a previously-paired device) or registration
// material (for a fresh pairing QR/phone-number flow).
//
// Field numbers match the WhatsApp Web wire format. Only the fields
// we actually need for Phase 1 login + pairing are modelled; many
// optional fields on the wire are omitted and can be added later
// without breaking compatibility (proto3 optional semantics).

syntax = "proto3";

package pywhats.proto;

message ClientPayload {
  optional uint64 username = 1;
  optional bool passive = 3;
  optional UserAgent user_agent = 5;
  optional WebInfo web_info = 6;
  optional string push_name = 7;
  optional sfixed32 session_id = 9;
  optional bool short_connect = 10;
  optional ConnectType connect_type = 12;
  optional ConnectReason connect_reason = 13;
  repeated int32 shards = 14;
  optional DNSSource dns_source = 15;
  optional uint32 connect_attempt_count = 16;
  optional uint32 device = 18;
  optional DevicePairingRegistrationData device_pairing_data = 19;
  optional Product product = 20;
  optional IOSAppExtension ios_app_extension = 30;
  optional uint64 fb_app_id = 31;
  optional bytes fb_device_id = 32;
  optional bool pull = 33;
  optional bytes padding_bytes = 34;

  enum ConnectType {
    CELLULAR_UNKNOWN = 0;
    WIFI_UNKNOWN = 1;
  }

  enum ConnectReason {
    PUSH = 0;
    USER_ACTIVATED = 1;
    SCHEDULED = 2;
    ERROR_RECONNECT = 3;
    NETWORK_SWITCH = 4;
    PING_RECONNECT = 5;
    UNKNOWN = 6;
  }

  enum IOSAppExtension {
    SHARE_EXTENSION = 0;
    SERVICE_EXTENSION = 1;
    INTENTS_EXTENSION = 2;
  }

  enum Product {
    WHATSAPP = 0;
    MESSENGER = 1;
    INTEROP = 2;
    INTEROP_MSGR = 3;
    WHATSAPP_LID = 4;
  }

}

message DNSSource {
  optional DNSResolutionMethod dns_method = 15;
  optional bool app_cached = 16;
  enum DNSResolutionMethod {
    SYSTEM = 0;
    GOOGLE = 1;
    HARDCODED = 2;
    OVERRIDE = 3;
    FALLBACK = 4;
    MNS = 5;
  }
}

message DevicePairingRegistrationData {
  optional bytes e_regid = 1;
  optional bytes e_keytype = 2;
  optional bytes e_ident = 3;
  optional bytes e_skey_id = 4;
  optional bytes e_skey_val = 5;
  optional bytes e_skey_sig = 6;
  optional bytes build_hash = 7;
  optional bytes device_props = 8;
}

message UserAgent {
  optional Platform platform = 1;
  optional AppVersion app_version = 2;
  optional string mcc = 3;
  optional string mnc = 4;
  optional string os_version = 5;
  optional string manufacturer = 6;
  optional string device = 7;
  optional string os_build_number = 8;
  optional string phone_id = 9;
  optional ReleaseChannel release_channel = 10;
  optional string locale_language_iso_639_1 = 11;
  optional string locale_country_iso_3166_1_alpha_2 = 12;
  optional string device_board = 13;
  optional string device_exp_id = 14;
  optional DeviceType device_type = 15;
  optional string device_model_type = 16;

  message AppVersion {
    optional uint32 primary = 1;
    optional uint32 secondary = 2;
    optional uint32 tertiary = 3;
    optional uint32 quaternary = 4;
    optional uint32 quinary = 5;
  }

  enum DeviceType {
    PHONE = 0;
    TABLET = 1;
    DESKTOP = 2;
    WEARABLE = 3;
    VR = 4;
  }

  enum Platform {
    ANDROID = 0;
    IOS = 1;
    WINDOWS_PHONE = 2;
    BLACKBERRY = 3;
    BLACKBERRYX = 4;
    S40 = 5;
    S60 = 6;
    PYTHON_CLIENT = 7;
    TIZEN = 8;
    ENTERPRISE = 9;
    SMB_ANDROID = 10;
    KAIOS = 11;
    SMB_IOS = 12;
    WINDOWS = 13;
    WEB = 14;
    PORTAL = 15;
    GREEN_ANDROID = 16;
    GREEN_IPHONE = 17;
    BLUE_ANDROID = 18;
    BLUE_IPHONE = 19;
    FBLITE_ANDROID = 20;
    MLITE_ANDROID = 21;
    IGLITE_ANDROID = 22;
    PAGE = 23;
    MACOS = 24;
    OCULUS_MSG = 25;
    OCULUS_CALL = 26;
    MILAN = 27;
    CAPI = 28;
    WEAROS = 29;
    ARDEVICE = 30;
    VRDEVICE = 31;
    BLUE_WEB = 32;
    IPAD = 33;
  }

  enum ReleaseChannel {
    RELEASE = 0;
    BETA = 1;
    ALPHA = 2;
    DEBUG = 3;
  }
}

message WebInfo {
  optional string ref_token = 1;
  optional string version = 2;
  optional WebdPayload webd_payload = 3;
  optional WebSubPlatform web_sub_platform = 4;

  message WebdPayload {
    optional bool uses_participant_in_key = 1;
    optional bool supports_starred_messages = 2;
    optional bool supports_document_messages = 3;
    optional bool supports_url_messages = 4;
    optional bool supports_media_retry = 5;
    optional bool supports_e2e_image = 6;
    optional bool supports_e2e_video = 7;
    optional bool supports_e2e_audio = 8;
    optional bool supports_e2e_document = 9;
    optional string document_types = 10;
    optional bytes features = 11;
  }

  enum WebSubPlatform {
    WEB_BROWSER = 0;
    APP_STORE = 1;
    WIN_STORE = 2;
    DARWIN = 3;
    WIN32 = 4;
    WIN_HYBRID = 5;
  }
}
