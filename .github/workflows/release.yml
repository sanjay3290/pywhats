name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    outputs:
      is_final: ${{ steps.check.outputs.is_final }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Determine release type
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_final=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a final release (will publish to PyPI)."
          else
            echo "is_final=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a pre-release (build only, not published)."
          fi

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.is_final == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pywhats
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
